server:
  port: 8080

spring:
  application:
    name: gesture-music-studio

  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:gesture_music_studio}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    open-in-view: false

logging:
  level:
    org.hibernate.SQL: warn

app:
  jwt:
    secret: ${JWT_SECRET:gesture-music-studio-dev-secret-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://10.10.2.66:5173,http://10.10.1.190:5173}
  gesture:
    debounce-cooldown-ms: 500
  google:
    client-id: ${GOOGLE_CLIENT_ID:1049407379801-9o5j7iubrj2lrubplme4ppnvbo334lo3.apps.googleusercontent.com}
